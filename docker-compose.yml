# docker-compose.yml – Orchestration complète des services
# Lancement : docker compose up --build
#
# Architecture réseau sécurisée :
#   frontend_network  → Nginx ↔ API Gateway uniquement
#   backend_network   → API Gateway ↔ Microservices ↔ BDD ↔ RabbitMQ
#
# Le frontend (servi par Nginx) ne peut jamais atteindre
# les microservices directement — tout passe par l'API Gateway.

services:

  # BASES DE DONNÉES – 4 instances PostgreSQL isolées
  # Chaque service a sa propre BDD, aucun partage entre services
  # Réseau : backend_network uniquement (invisible depuis Nginx)

  # BDD du Auth Service – port hôte 5432
  auth-db:
    image: postgres:16-alpine
    container_name: reservation_auth_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    volumes:
      # Volume nommé pour persister les données entre redémarrages
      - auth_db_data:/var/lib/postgresql/data
    ports:
      # Exposé sur l'hôte uniquement pour les outils externes (TablePlus, DBeaver)
      - "5432:5432"
    networks:
      - backend_network
    healthcheck:
      # pg_isready vérifie que PostgreSQL accepte les connexions
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER} -d ${AUTH_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # BDD du User Service – port hôte 5433
  user-db:
    image: postgres:16-alpine
    container_name: reservation_user_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${USER_DB_USER}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
      POSTGRES_DB: ${USER_DB_NAME}
    volumes:
      - user_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_DB_USER} -d ${USER_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # BDD du Event Service – port hôte 5434
  event-db:
    image: postgres:16-alpine
    container_name: reservation_event_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${EVENT_DB_USER}
      POSTGRES_PASSWORD: ${EVENT_DB_PASSWORD}
      POSTGRES_DB: ${EVENT_DB_NAME}
    volumes:
      - event_db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EVENT_DB_USER} -d ${EVENT_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # BDD du Ticket Service – port hôte 5435
  ticket-db:
    image: postgres:16-alpine
    container_name: reservation_ticket_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${TICKET_DB_USER}
      POSTGRES_PASSWORD: ${TICKET_DB_PASSWORD}
      POSTGRES_DB: ${TICKET_DB_NAME}
    volumes:
      - ticket_db_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TICKET_DB_USER} -d ${TICKET_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # RABBITMQ – Broker de messages asynchrones
  # Réseau : backend_network uniquement
  # Interface de management accessible sur http://localhost:15672
  rabbitmq:
    image: rabbitmq:3-management
    container_name: reservation_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    volumes:
      # Persister les messages entre redémarrages
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"    # Port AMQP pour les connexions des services
      - "15672:15672"  # Port UI de management (navigateur)
    networks:
      - backend_network
    healthcheck:
      # rabbitmq-diagnostics ping vérifie que le broker répond
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # MICROSERVICES SYMFONY – Auth, User, Event
  # Réseau : backend_network uniquement
  # Invisibles depuis Nginx et le frontend

  # Auth Service – Gestion JWT et authentification
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: reservation_auth_service
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-prod}
      DATABASE_URL: ${AUTH_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL: ${JWT_TTL:-3600}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-604800}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # User Service – Gestion des profils utilisateurs
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: reservation_user_service
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-prod}
      DATABASE_URL: ${USER_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      TICKET_SERVICE_URL: ${TICKET_SERVICE_URL}
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Event Service – Gestion des événements et des places
  event-service:
    build:
      context: ./services/event-service
      dockerfile: Dockerfile
    container_name: reservation_event_service
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-prod}
      DATABASE_URL: ${EVENT_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      event-db:
        condition: service_healthy
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8003/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # MICROSERVICES NODE.JS – Ticket, Notification
  # Réseau : backend_network uniquement

  # Ticket Service – Achat de billets et paiement CB simulé
  ticket-service:
    build:
      context: ./services/ticket-service
      dockerfile: Dockerfile
    container_name: reservation_ticket_service
    restart: unless-stopped
    environment:
      NODE_ENV: ${APP_ENV:-production}
      PORT: ${TICKET_SERVICE_PORT:-8004}
      DATABASE_URL: ${TICKET_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: ${RABBITMQ_URL}
      EVENT_SERVICE_URL: ${EVENT_SERVICE_URL}
    depends_on:
      ticket-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8004/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Notification Service – Consumer RabbitMQ, simulation email/SMS
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: reservation_notification_service
    restart: unless-stopped
    environment:
      NODE_ENV: ${APP_ENV:-production}
      PORT: ${NOTIFICATION_SERVICE_PORT:-8005}
      RABBITMQ_URL: ${RABBITMQ_URL}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8005/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # API GATEWAY – Le seul service sur les DEUX réseaux
  # C'est le pont sécurisé entre le frontend et les microservices.
  # - frontend_network : reçoit les requêtes de Nginx
  # - backend_network  : transfère vers les microservices
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: reservation_api_gateway
    restart: unless-stopped
    environment:
      NODE_ENV: ${APP_ENV:-production}
      PORT: ${API_GATEWAY_PORT:-8000}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      EVENT_SERVICE_URL: ${EVENT_SERVICE_URL}
      TICKET_SERVICE_URL: ${TICKET_SERVICE_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      event-service:
        condition: service_healthy
      ticket-service:
        condition: service_healthy
    networks:
      - frontend_network  # Reçoit les requêtes de Nginx
      - backend_network   # Accède aux microservices
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # NGINX – Load Balancer + serveur de fichiers statiques frontend
  # Réseau : frontend_network uniquement
  # Seul port exposé sur l'hôte (80)
  # Ne voit que l'API Gateway, jamais les microservices
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: reservation_nginx
    restart: unless-stopped
    ports:
      # Seul point d'entrée exposé vers l'extérieur
      - "80:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - frontend_network  # Voit uniquement l'API Gateway
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # FRONTEND – React 18 + TypeScript
  # Réseau : frontend_network uniquement
  # Communique UNIQUEMENT avec Nginx, jamais directement
  # avec les microservices ou les BDD
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reservation_frontend
    restart: unless-stopped
    depends_on:
      - nginx
    networks:
      - frontend_network  # Réseau limité : ne voit que Nginx et Gateway

# RÉSEAUX – Isolation sécurisée par couche
#
#   frontend_network : Nginx ↔ API Gateway ↔ Frontend
#   backend_network  : API Gateway ↔ Services ↔ BDD ↔ RabbitMQ
#
# Aucun service backend n'est joignable depuis frontend_network
# sauf l'API Gateway qui fait le pont entre les deux.
networks:
  frontend_network:
    name: reservation_frontend_network
    driver: bridge
  backend_network:
    name: reservation_backend_network
    driver: bridge

# VOLUMES – Persistance des données entre redémarrages
volumes:
  auth_db_data:
    name: reservation_auth_db_data
  user_db_data:
    name: reservation_user_db_data
  event_db_data:
    name: reservation_event_db_data
  ticket_db_data:
    name: reservation_ticket_db_data
  rabbitmq_data:
    name: reservation_rabbitmq_data