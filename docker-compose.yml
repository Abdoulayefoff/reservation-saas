# docker-compose.yml – Orchestration complète des services
# Lancement : docker compose up --build
#
# Architecture réseau sécurisée :
#   frontend_network  → Nginx ↔ API Gateway ↔ Frontend
#   backend_network   → API Gateway ↔ Microservices ↔ BDD ↔ RabbitMQ
#
# Le frontend ne peut jamais atteindre les microservices directement.
# Tout passe obligatoirement par l'API Gateway.

services:

  # BASES DE DONNÉES – 4 instances PostgreSQL isolées
  # Réseau : backend_network uniquement

  auth-db:
    image: postgres:16-alpine
    container_name: reservation_auth_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER} -d ${AUTH_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  user-db:
    image: postgres:16-alpine
    container_name: reservation_user_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${USER_DB_USER}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
      POSTGRES_DB: ${USER_DB_NAME}
    volumes:
      - user_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_DB_USER} -d ${USER_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  event-db:
    image: postgres:16-alpine
    container_name: reservation_event_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${EVENT_DB_USER}
      POSTGRES_PASSWORD: ${EVENT_DB_PASSWORD}
      POSTGRES_DB: ${EVENT_DB_NAME}
    volumes:
      - event_db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EVENT_DB_USER} -d ${EVENT_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ticket-db:
    image: postgres:16-alpine
    container_name: reservation_ticket_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${TICKET_DB_USER}
      POSTGRES_PASSWORD: ${TICKET_DB_PASSWORD}
      POSTGRES_DB: ${TICKET_DB_NAME}
    volumes:
      - ticket_db_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TICKET_DB_USER} -d ${TICKET_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # RABBITMQ – Broker de messages asynchrones
  # Réseau : backend_network uniquement
  rabbitmq:
    image: rabbitmq:3-management
    container_name: reservation_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # MICROSERVICES SYMFONY – Auth, User, Event
  # Volumes : code source monté depuis l'hôte
  # vendor/ persisté dans un volume nommé (installé par setup.sh)
  # Réseau : backend_network uniquement

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: reservation_auth_service
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: ${AUTH_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_PASSPHRASE: ${JWT_PASSPHRASE}
      JWT_TTL: ${JWT_TTL:-3600}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-604800}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
    volumes:
      # Monte le code source local dans le container
      # Toute modification locale est immédiatement visible
      - ./services/auth-service:/app
      # Volume nommé pour vendor/ – évite d'écraser les dépendances
      # installées par setup.sh avec le dossier local (vide)
      - auth_vendor:/app/vendor
      # Volume nommé pour les clés JWT générées par setup.sh
      - auth_jwt:/app/config/jwt
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: reservation_user_service
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: ${USER_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      TICKET_SERVICE_URL: ${TICKET_SERVICE_URL}
    volumes:
      # Monte le code source local dans le container
      - ./services/user-service:/app
      # Volume nommé pour vendor/
      - user_vendor:/app/vendor
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  event-service:
    build:
      context: ./services/event-service
      dockerfile: Dockerfile
    container_name: reservation_event_service
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: ${EVENT_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      # Monte le code source local dans le container
      - ./services/event-service:/app
      # Volume nommé pour vendor/
      - event_vendor:/app/vendor
    depends_on:
      event-db:
        condition: service_healthy
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8003/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # MICROSERVICES NODE.JS – Ticket, Notification
  # Volumes : code source monté depuis l'hôte
  # node_modules/ et dist/ persistés dans des volumes nommés
  # Réseau : backend_network uniquement

  ticket-service:
    build:
      context: ./services/ticket-service
      dockerfile: Dockerfile
    container_name: reservation_ticket_service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${TICKET_SERVICE_PORT:-8004}
      DATABASE_URL: ${TICKET_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: ${RABBITMQ_URL}
      EVENT_SERVICE_URL: ${EVENT_SERVICE_URL}
    volumes:
      # Monte le code source local dans le container
      - ./services/ticket-service:/app
      # Volume nommé pour node_modules/
      - ticket_node_modules:/app/node_modules
      # Volume nommé pour dist/ (build TypeScript)
      - ticket_dist:/app/dist
    depends_on:
      ticket-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8004/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: reservation_notification_service
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${NOTIFICATION_SERVICE_PORT:-8005}
      RABBITMQ_URL: ${RABBITMQ_URL}
    volumes:
      # Monte le code source local dans le container
      - ./services/notification-service:/app
      # Volume nommé pour node_modules/
      - notification_node_modules:/app/node_modules
      # Volume nommé pour dist/ (build TypeScript)
      - notification_dist:/app/dist
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8005/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # API GATEWAY – Le seul service sur les DEUX réseaux
  # Pont sécurisé entre frontend et microservices
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: reservation_api_gateway
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_GATEWAY_PORT:-8000}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      EVENT_SERVICE_URL: ${EVENT_SERVICE_URL}
      TICKET_SERVICE_URL: ${TICKET_SERVICE_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    volumes:
      # Monte le code source local dans le container
      - ./services/api-gateway:/app
      # Volume nommé pour node_modules/
      - gateway_node_modules:/app/node_modules
      # Volume nommé pour dist/ (build TypeScript)
      - gateway_dist:/app/dist
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      event-service:
        condition: service_healthy
      ticket-service:
        condition: service_healthy
    networks:
      - frontend_network
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # NGINX – Load Balancer
  # Réseau : frontend_network uniquement
  # Seul port exposé sur l'hôte (80)
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: reservation_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - frontend_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # FRONTEND – React 18 + TypeScript
  # Réseau : frontend_network uniquement
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reservation_frontend
    restart: unless-stopped
    volumes:
      # Monte le code source local dans le container
      - ./frontend:/app
      # Volume nommé pour node_modules/
      - frontend_node_modules:/app/node_modules
      # Volume nommé pour dist/ (build React)
      - frontend_dist:/app/dist
    depends_on:
      - nginx
    networks:
      - frontend_network

# RÉSEAUX – Isolation sécurisée par couche
# frontend_network : Nginx ↔ API Gateway ↔ Frontend
# backend_network  : API Gateway ↔ Services ↔ BDD ↔ RabbitMQ
networks:
  frontend_network:
    name: reservation_frontend_network
    driver: bridge
  backend_network:
    name: reservation_backend_network
    driver: bridge

# VOLUMES – Persistance des données et des dépendances
volumes:
  # Données PostgreSQL
  auth_db_data:
    name: reservation_auth_db_data
  user_db_data:
    name: reservation_user_db_data
  event_db_data:
    name: reservation_event_db_data
  ticket_db_data:
    name: reservation_ticket_db_data

  # Données RabbitMQ
  rabbitmq_data:
    name: reservation_rabbitmq_data

  # Dépendances Symfony (vendor/)
  auth_vendor:
    name: reservation_auth_vendor
  user_vendor:
    name: reservation_user_vendor
  event_vendor:
    name: reservation_event_vendor

  # Clés JWT Auth Service
  auth_jwt:
    name: reservation_auth_jwt

  # Dépendances Node.js (node_modules/ + dist/)
  ticket_node_modules:
    name: reservation_ticket_node_modules
  ticket_dist:
    name: reservation_ticket_dist
  notification_node_modules:
    name: reservation_notification_node_modules
  notification_dist:
    name: reservation_notification_dist
  gateway_node_modules:
    name: reservation_gateway_node_modules
  gateway_dist:
    name: reservation_gateway_dist
  frontend_node_modules:
    name: reservation_frontend_node_modules
  frontend_dist:
    name: reservation_frontend_dist