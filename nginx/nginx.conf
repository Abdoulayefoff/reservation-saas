worker_processes auto;
error_log /var/log/nginx/error.log warn; # Enregistre les erreurs (niveau warning) dans ce fichier
pid /var/run/nginx.pid; 

events { 
    worker_connections 1024; # Nombre maximum de connexions simultanées par processus
    use epoll; 
    multi_accept on; # Accepte toutes les nouvelles connexions en une seule fois
}

http { # Configuration du protocole HTTP
    include       /etc/nginx/mime.types; # Charge les types de fichiers (HTML, CSS, JS...)
    default_type  application/octet-stream; # Type par défaut si non reconnu (téléchargement)

    # Format de log personnalisé pour inclure les temps de réponse rt (request_time)
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent rt=$request_time';
    access_log /var/log/nginx/access.log main; # Applique le format de log aux accès

    sendfile    on; 
    tcp_nopush  on;
    tcp_nodelay on; 
    keepalive_timeout 65; 
    server_tokens off; 

    # API Gateway upstream : répartit la charge (Load Balancing)
    upstream api_gateway { 
        least_conn; # Algorithme envoyant les requêtes au serveur le moins chargé
        server api-gateway:8000; # Instance de l'API Gateway sur le réseau Docker
        keepalive 32; # Nombre de connexions persistantes gardées ouvertes
    } 

    # Frontend React upstream
    upstream frontend {
        server frontend:3000; # Instance du Frontend sur le port 3000
        keepalive 16; # Connexions persistantes
    } 

    server { # Configuration du serveur virtuel
        listen 80; # Écoute sur le port 80 (HTTP)
        server_name _; # Répond à tous les noms de domaine/IP non captés

        # Headers sécurité appliqués à toutes les réponses par défaut
        add_header X-Frame-Options "SAMEORIGIN" always; 
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        client_max_body_size 10M; 

        # Healthcheck Docker : endpoint local pour vérifier la santé de Nginx
        location /health { 
            access_log off;
            add_header Content-Type text/plain;
            return 200 "OK\n";
        } 

        # Toutes les requêtes API : redirigées vers l'API Gateway
        location /api/ { 
            proxy_pass http://api_gateway; 
            proxy_set_header Host              $host; # Passe le nom d'hôte d'origine
            proxy_set_header X-Real-IP         $remote_addr; 
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for; 
            proxy_set_header X-Forwarded-Proto $scheme; 
            proxy_connect_timeout  5s; 
            proxy_send_timeout     30s; 
            proxy_read_timeout     30s; 
            proxy_http_version 1.1; 
            proxy_set_header Connection ""; 
        } 

        # Documentation Swagger UI : redirigée vers l'API Gateway
        location /api-docs {
            proxy_pass http://api_gateway;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout  5s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Toutes les autres requêtes : redirigées vers le Frontend React (SPA)
        location / { # Capture TOUTE autre route (racine)
            proxy_pass http://frontend; # Transfère au groupe 'frontend'
            proxy_set_header Host              $host; 
            proxy_set_header X-Real-IP         $remote_addr; 
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for; 
            proxy_set_header X-Forwarded-Proto $scheme; 
            proxy_connect_timeout  5s; 
            proxy_send_timeout     30s; 
            proxy_read_timeout     30s; 
            proxy_http_version 1.1;
            proxy_set_header Connection ""; 
        }
    }
}
