# nginx.conf – Configuration du Load Balancer Nginx
# Point d'entrée unique de toutes les requêtes clients

# Nombre de processus worker (auto = 1 par CPU)
worker_processes auto;

# Fichier de log des erreurs Nginx
error_log /var/log/nginx/error.log warn;

# Fichier PID du processus principal
pid /var/run/nginx.pid;

# Bloc events – Gestion des connexions réseau
events {
    # Nombre max de connexions simultanées par worker
    worker_connections 1024;

    # Méthode de notification efficace sur Linux
    use epoll;

    # Accepter plusieurs connexions à la fois
    multi_accept on;
}

# Bloc http – Configuration du serveur HTTP
http {
    # Types MIME standards
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Format de log structuré pour le débogage
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # Optimisations réseau
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Masquer la version Nginx dans les réponses (sécurité)
    server_tokens off;

    # Upstream – Pool de serveurs API Gateway
    # least_conn : envoie au serveur avec le moins de connexions
    # actives, optimal pour des requêtes de durée variable
    # (ex: achat de billets plus long qu'une simple lecture)
    upstream api_gateway {
        least_conn;

        # Instance principale de l'API Gateway
        server api-gateway:8000;

        # Pour scaler, décommenter et ajouter des instances :
        # server api-gateway-2:8000;
        # server api-gateway-3:8000;

        # Maintenir les connexions ouvertes vers l'upstream
        keepalive 32;
    }

    # Serveur HTTP principal – écoute sur le port 80
    server {
        listen 80;
        server_name _;

        # Headers de sécurité HTTP ajoutés à chaque réponse
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Taille maximale des requêtes entrantes
        client_max_body_size 10M;

        # Endpoint /health – Utilisé par Docker pour healthcheck
        # Retourne 200 OK sans passer par l'API Gateway
        location /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "OK\n";
        }

        # Route principale – Proxy vers l'API Gateway
        # Toutes les requêtes sont forwardées à l'upstream
        location / {
            proxy_pass http://api_gateway;

            # Transmettre les infos du client original au service
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts pour éviter les connexions bloquantes
            proxy_connect_timeout  5s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;

            # HTTP/1.1 requis pour le keepalive upstream
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}