# routes/nelmio_api_doc.yaml – Routes Swagger UI pour User Service
# Documentation interactive accessible à /api/doc

# Route pour l'interface Swagger UI
app.swagger_ui:
    path: /api/doc
    methods: GET
    defaults:
        _controller: nelmio_api_doc.controller.swagger_ui

# Route pour le fichier JSON de la spec OpenAPI
app.swagger:
    path: /api/doc.json
    methods: GET
    defaults:
        _controller: nelmio_api_doc.controller.swagger_json
