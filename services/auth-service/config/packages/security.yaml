# security.yaml – Configuration de la sécurité Auth Service
# Authentification JWT stateless via LexikJWTAuthenticationBundle

security:
    # ─────────────────────────────────────────────────────────
    # Hashage des mots de passe – bcrypt avec coût automatique
    # Le coût sera ≥ 12 par défaut (sécurité recommandée)
    # ─────────────────────────────────────────────────────────
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # ─────────────────────────────────────────────────────────
    # Provider – Charge les utilisateurs depuis la base de données
    # ─────────────────────────────────────────────────────────
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    # ─────────────────────────────────────────────────────────
    # Hiérarchie des rôles RBAC
    # ADMIN hérite de EVENT_CREATOR qui hérite de USER
    # ─────────────────────────────────────────────────────────
    role_hierarchy:
        ROLE_EVENT_CREATOR: ROLE_USER
        ROLE_ADMIN: [ROLE_EVENT_CREATOR, ROLE_USER]

    # ─────────────────────────────────────────────────────────
    # Firewalls – Définissent comment chaque zone est protégée
    # ─────────────────────────────────────────────────────────
    firewalls:
        # Routes de développement Symfony (profiler, assets)
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        # Routes publiques (login, register, health, doc)
        # Pas d'authentification requise
        public:
            pattern: ^/(auth/login|auth/register|auth/refresh|health|api/doc)
            security: false

        # Routes protégées par JWT (toutes les autres)
        api:
            pattern: ^/
            stateless: true
            provider: app_user_provider
            jwt: ~

    # ─────────────────────────────────────────────────────────
    # Contrôle d'accès par route
    # Seule la PREMIÈRE règle correspondante s'applique
    # ─────────────────────────────────────────────────────────
    access_control:
        # Routes publiques – accessibles sans authentification
        - { path: ^/health, roles: PUBLIC_ACCESS }
        - { path: ^/api/doc, roles: PUBLIC_ACCESS }
        - { path: ^/auth/login, roles: PUBLIC_ACCESS }
        - { path: ^/auth/register, roles: PUBLIC_ACCESS }
        - { path: ^/auth/refresh, roles: PUBLIC_ACCESS }

        # Toutes les autres routes nécessitent un JWT valide
        - { path: ^/, roles: IS_AUTHENTICATED_FULLY }

# Configuration pour les tests – hashage rapide
when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
