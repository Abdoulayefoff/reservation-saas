nelmio_api_doc:
    documentation:
        info:
            title: Event Service API
            description: API for managing events and their availability
            version: 1.0.0
        servers:
            - url: http://localhost:8000
              description: API Gateway
        components:
            securitySchemes:
                BearerAuth:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
        security:
            - BearerAuth: []
    areas:
        default:
            path_patterns:
                - ^/events(?!/doc$)
