# nginx.conf – Serveur Frontend SPA (React)
# Toutes les routes non trouvées redirigent vers index.html
# pour que React Router gère la navigation côté client
server {
    listen 3000;
    server_name _;

    # Dossier racine contenant les fichiers compilés par Vite
    root /usr/share/nginx/html;
    index index.html;

    # Compression des réponses pour améliorer les performances
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Cache long pour les assets avec hash Vite (JS/CSS/images)
    # Les fichiers Vite ont un hash dans leur nom, donc safe à cacher longtemps
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback – toutes les routes → index.html
    # Sans ça, un refresh sur /events retournerait 404
    location / {
        try_files $uri $uri/ /index.html;
    }
}